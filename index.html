<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonny Davison - Director & Founder</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111111; /* Clean deep black background */
            color: #E5E5E5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 90vh;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            max-width: 360px;
            width: 100%;
            text-align: center;
        }

        /* Logo Layout Styling */
        .logo {
            width: 300px;
            height: 300px;
            object-fit: contain;
            margin-bottom: 10px;
            border-radius: 16px; /* Smooth card corners for the logo badge */
        }

        /* Gold Name Header */
        h1 { 
            margin: 15px 0 4px 0; 
            font-weight: 700; 
            color: #D4AF37; /* Crisp brand gold */
            font-size: 28px;
            letter-spacing: 0.3px;
        }

        /* Company Label Subtitle */
        .subtitle { 
            color: #8E8E93; 
            margin-bottom: 30px; 
            font-size: 16px; 
            font-weight: 400;
        }

        /* --- VERTICAL GOLD BUTTONS --- */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        /* Precise Match for the Gold Buttons in Screenshot */
        .btn-gold {
            display: block;
            background-color: #D4AF37; /* Premium Solid Gold */
            color: #111111; /* Solid dark text contrast */
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
        }

        .btn-gold:hover {
            transform: translateY(-1px);
            background-color: #E5C158; /* Subtle highlight brightness on interaction */
            box-shadow: 0 6px 14px rgba(212, 175, 55, 0.15);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="archway group 1.jpeg" alt="Hive Key Property Logo" class="logo">
        
        <h1>Jonny Davison</h1>
        <div class="subtitle">Director & Founder</div>

        <div class="button-container">
            
            <a href="https://calendar.app.google/LeeqBfNVmT1jcbbe6" class="btn-gold" target="_blank">
                Schedule a Call
            </a>
            
            <a href="https://linkedin.com/in/jonny-davison-0b5ab7129" class="btn-gold" target="_blank">
                View LinkedIn
            </a>
            
            <a href="mailto:jonnydavison.archway@gmail.com?subject=Inquiry" class="btn-gold">
                Contact Me
            </a>
            
        </div>
    </div>

</body>
</html>
